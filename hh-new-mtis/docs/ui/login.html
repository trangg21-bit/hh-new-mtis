<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — Quản lý KCHT Hàng hải</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family: Averta, -apple-system, 'Segoe UI', sans-serif; }
body {
  background: linear-gradient(135deg, #e0f2fe 0%, #eff8ff 50%, #f4f4f5 100%);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.login-container {
  background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  padding: 48px 40px; width: 400px; max-width: 90vw;
}
.logo {
  display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
  justify-content: center;
}
.logo-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #2153aa, #1a3f8a);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 22px;
}
.logo-text { line-height: 1.3; }
.logo-text strong { display:block; font-size: 16px; color: #1a1a2e; }
.logo-text small { font-size: 12px; color: #6b7280; }
h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #1a1a2e; }
.sub { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
.form-control {
  width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 6px;
  font-size: 14px; font-family: inherit; transition: border-color 0.15s; outline: none;
}
.form-control:focus { border-color: #2153aa; box-shadow: 0 0 0 3px rgba(33,83,170,0.12); }
.btn {
  width: 100%; padding: 12px; background: #2153aa; color: #fff; border: none;
  border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.btn:hover { background: #1a3f8a; }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.error { background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.footer { text-align: center; margin-top: 24px; font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <img class="logo-img" src="assets/logo-cuc-hang-hai.svg" alt="Cục Hàng hải Việt Nam" onerror="this.style.display='none'">
    <div class="logo-text"><strong>Quản lý KCHT Hàng hải</strong><small>Cục Hàng hải Việt Nam</small></div>
  </div>
  <h1>Đăng nhập hệ thống</h1>
  <p class="sub">Hệ thống quản lý KCHT Giao thông Hàng hải</p>

  <div class="error" id="login-error"></div>

  <div class="form-group">
    <label for="username">Tên đăng nhập</label>
    <input class="form-control" id="username" type="text" placeholder="Nhập tên đăng nhập" autocomplete="username" value="admin">
  </div>
  <div class="form-group">
    <label for="password">Mật khẩu</label>
    <input class="form-control" id="password" type="password" placeholder="Nhập mật khẩu" autocomplete="current-password" value="admin123">
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">Đăng nhập</button>

  <div class="footer">
    Cục Hàng hải Việt Nam — Phiên bản 1.0
  </div>
</div>

<script>
async function doLogin() {
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-error');
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  if (!username || !password) { err.textContent = 'Vui lòng nhập tên đăng nhập và mật khẩu'; err.style.display = ''; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Đang đăng nhập...';
  err.style.display = 'none';
  try {
    var res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    var data = await res.json();
    if (!res.ok) { throw new Error(data.error || 'Đăng nhập thất bại'); }
    localStorage.setItem('mtis_token', data.token);
    localStorage.setItem('mtis_user', JSON.stringify(data.user));
    window.location.href = '/dashboard.html';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Đăng nhập';
  }
}

// Enter key to login
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
