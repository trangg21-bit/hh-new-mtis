version: '3.8'

services:
  api:
    build:
      context: ./src/apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src/apps/api/data:/app/data
      - ./docs/ui:/app/public
    environment:
      - PORT=3000
      - DB_PATH=/app/data/database.sqlite
      - NODE_ENV=development
      - JWT_SECRET=mtis-dev-secret-key-2026-change-in-production
    restart: unless-stopped
